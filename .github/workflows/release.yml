name: Release

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  tag:
    name: Generate Version Tag
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.version.outputs.new_tag }}
      should_release: ${{ steps.version.outputs.should_release }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: version
        run: |
          LATEST_TAG=$(git tag --list 'v*.*.*' --sort=-version:refname | head -n1)
          LATEST_TAG=${LATEST_TAG:-v0.0.0}
          echo "Latest tag: $LATEST_TAG"

          COMMITS_SINCE=$(git rev-list "${LATEST_TAG}..HEAD" --count 2>/dev/null || echo "1")
          echo "Commits since last tag: $COMMITS_SINCE"

          if [ "$COMMITS_SINCE" -eq 0 ]; then
            echo "No new commits since last tag, skipping release"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "new_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          else
            VERSION=${LATEST_TAG#v}
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            NEW_PATCH=$((PATCH + COMMITS_SINCE))
            NEW_TAG="v${MAJOR}.${MINOR}.${NEW_PATCH}"
            echo "New tag: $NEW_TAG"
            echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.version.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.new_tag }}"
          git push origin "${{ steps.version.outputs.new_tag }}"

  build:
    name: Build (${{ matrix.os }})
    needs: tag
    if: needs.tag.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: cjit-linux-x86_64
          - os: ubuntu-22.04-arm
            artifact: cjit-linux-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        run: sudo apt-get update && sudo apt-get install -y cmake gcc

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=dist

      - name: Build
        run: cmake --build build --parallel

      - name: Install to staging dir
        run: cmake --install build

      - name: Package binary
        run: |
          cp dist/bin/cjit ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: [tag, build]
    if: needs.tag.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.new_tag }}
          name: cjit ${{ needs.tag.outputs.new_tag }}
          body: |
            ## cjit ${{ needs.tag.outputs.new_tag }}

            ### What's included
            | File | Platform |
            |------|----------|
            | `cjit-linux-x86_64` | Linux x86-64 |
            | `cjit-linux-aarch64` | Linux AArch64 |

            ### Usage
            ```sh
            chmod +x cjit-linux-x86_64
            ./cjit-linux-x86_64 your_file.c
            ```

            See the [README](README.md) for full documentation.
          files: |
            artifacts/cjit-linux-x86_64/cjit-linux-x86_64
            artifacts/cjit-linux-aarch64/cjit-linux-aarch64
